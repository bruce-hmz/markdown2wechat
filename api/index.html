<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown 转微信公众号格式工具</title>

    <!-- EasyMDE CSS -->
    <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1>Markdown 转微信公众号格式工具</h1>
            <div class="controls">
                <select id="theme-select" class="theme-select">
                    <option value="default">默认主题</option>
                    <option value="elegant">优雅主题</option>
                    <option value="tech">科技主题</option>
                </select>
                <button id="copy-btn" class="btn btn-primary">复制到剪贴板</button>
            </div>
        </header>

        <!-- 主要内容区 -->
        <div class="main-content">
            <!-- 编辑器区 -->
            <div class="editor-section">
                <div class="section-header">
                    <h2>Markdown 编辑器</h2>
                    <span id="word-count" class="word-count">0 字</span>
                </div>
                <textarea id="editor"></textarea>
            </div>

            <!-- 预览区 -->
            <div class="preview-section">
                <div class="section-header">
                    <h2>实时预览</h2>
                </div>
                <div id="preview" class="preview-content">
                    <p class="placeholder">在左侧输入 Markdown 内容，这里将实时显示预览效果...</p>
                </div>
                <!-- 回到顶部按钮 -->
                <button id="back-to-top" class="back-to-top-btn" title="回到顶部">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 15l-6-6-6 6"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- 底部信息 -->
        <footer class="footer">
            <p>提示：转换后的内容可以直接粘贴到微信公众号编辑器中使用</p>
        </footer>
    </div>

    <!-- EasyMDE JS -->
    <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>

    <!-- Custom JS -->
    <script src="/static/js/app.js"></script>
</body>
</html>
